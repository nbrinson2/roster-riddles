# Docker image for the Angular + Express app.
#
# REQUIRED trigger substitutions (non-empty), passed as --build-arg to Docker:
#   _FIREBASE_API_KEY, _FIREBASE_AUTH_DOMAIN, _FIREBASE_PROJECT_ID,
#   _FIREBASE_STORAGE_BUCKET, _FIREBASE_MESSAGING_SENDER_ID, _FIREBASE_APP_ID
# Optional: _FIREBASE_MEASUREMENT_ID, _API_BASE_URL, _DEPLOYMENT (default production; use `staging` + staging Firebase subs for a staging service)
# Optional Stripe (Phase 1): _STRIPE_PUBLISHABLE_KEY — test (`pk_test_`) for staging trigger, live (`pk_live_`) for prod only (see docs/stripe.md)
#
# Also set: _AR_HOSTNAME, _AR_PROJECT_ID, _AR_REPOSITORY, _AR_IMAGE_PATH (Artifact Registry
# image path under the repo — Cloud Run “deploy from source” often uses
# roster-riddles/roster-riddles), _SERVICE_NAME (Cloud Run service for gcloud run deploy).
#
# If these are missing, `npm run build:prod` fails: generate-env-prod.mjs exits 1.
# In Cloud Build → your trigger → Substitution variables — add each _FIREBASE_* key
# with the same values you use for local production builds / Firebase web app config.
#
# IMPORTANT: The default Cloud Run continuous-deployment trigger runs `docker build -f Dockerfile`
# only (no --build-arg). You must set the trigger to use THIS file — see README and
# `scripts/create-web-build-trigger.sh`.
#
# Built-in substitution `$PROJECT_ID` is the GCP project running the build (set `gcloud builds submit --project` or trigger project).

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_AR_IMAGE_PATH:$COMMIT_SHA'
      - '.'
      - '--build-arg'
      - 'DEPLOYMENT=$_DEPLOYMENT'
      - '--build-arg'
      - 'FIREBASE_API_KEY=$_FIREBASE_API_KEY'
      - '--build-arg'
      - 'FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'FIREBASE_STORAGE_BUCKET=$_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'FIREBASE_MESSAGING_SENDER_ID=$_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'FIREBASE_APP_ID=$_FIREBASE_APP_ID'
      - '--build-arg'
      - 'FIREBASE_MEASUREMENT_ID=$_FIREBASE_MEASUREMENT_ID'
      - '--build-arg'
      - 'API_BASE_URL=$_API_BASE_URL'
      - '--build-arg'
      - 'STRIPE_PUBLISHABLE_KEY=$_STRIPE_PUBLISHABLE_KEY'
      - '--build-arg'
      - 'FIRESTORE_DATABASE_ID=$_FIRESTORE_DATABASE_ID'
      - '--build-arg'
      - 'ADMIN_DASHBOARD_UI_ENABLED=$_ADMIN_DASHBOARD_UI_ENABLED'

  # Push before deploy: the `images:` shortcut pushes only after *all* steps, which would run deploy too early.
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_AR_IMAGE_PATH:$COMMIT_SHA'

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --project=$PROJECT_ID
      - --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_AR_IMAGE_PATH:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --platform=managed
      # Public web app + SPA; remove or use IAM if the service must stay private.
      - --allow-unauthenticated
      - --quiet

# Defaults for local `gcloud builds submit`; the trigger overrides these with your console values.
substitutions:
  _AR_HOSTNAME: us-east1-docker.pkg.dev
  _AR_PROJECT_ID: roster-riddles-457600
  _AR_REPOSITORY: cloud-run-source-deploy
  # Artifact Registry docker image path (after repository name); matches Cloud Run source-deploy layout.
  _AR_IMAGE_PATH: roster-riddles/roster-riddles
  _SERVICE_NAME: roster-riddles
  _DEPLOY_REGION: us-east1
  _API_BASE_URL: ''
  _STRIPE_PUBLISHABLE_KEY: ''
  _DEPLOYMENT: 'production'
  # Must match Angular `firestoreDatabaseId` (see scripts/generate-env-prod.mjs). Staging: set to empty for (default) DB.
  _FIRESTORE_DATABASE_ID: roster-riddles
  _FIREBASE_API_KEY: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_PROJECT_ID: ''
  _FIREBASE_STORAGE_BUCKET: ''
  _FIREBASE_MESSAGING_SENDER_ID: ''
  _FIREBASE_APP_ID: ''
  _FIREBASE_MEASUREMENT_ID: ''
  # Story AD-4 — optional; omit or empty = admin UI enabled (same as LEADERBOARDS_UI_ENABLED pattern)
  _ADMIN_DASHBOARD_UI_ENABLED: ''

options:
  logging: CLOUD_LOGGING_ONLY
  # Angular + Docker can exceed the default 10m on cold caches.
  machineType: E2_HIGHCPU_8

timeout: 1800s

# Docker image for the Angular + Express app.
#
# REQUIRED trigger substitutions (non-empty), passed as --build-arg to Docker:
#   _FIREBASE_API_KEY, _FIREBASE_AUTH_DOMAIN, _FIREBASE_PROJECT_ID,
#   _FIREBASE_STORAGE_BUCKET, _FIREBASE_MESSAGING_SENDER_ID, _FIREBASE_APP_ID
# Optional: _FIREBASE_MEASUREMENT_ID, _API_BASE_URL
#
# Also set: _AR_HOSTNAME, _AR_PROJECT_ID, _AR_REPOSITORY, _SERVICE_NAME (image name).
#
# If these are missing, `npm run build:prod` fails: generate-env-prod.mjs exits 1.
# In Cloud Build → your trigger → Substitution variables — add each _FIREBASE_* key
# with the same values you use for local production builds / Firebase web app config.

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$SHORT_SHA'
      - '.'
      - '--build-arg'
      - 'FIREBASE_API_KEY=$_FIREBASE_API_KEY'
      - '--build-arg'
      - 'FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'FIREBASE_STORAGE_BUCKET=$_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'FIREBASE_MESSAGING_SENDER_ID=$_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'FIREBASE_APP_ID=$_FIREBASE_APP_ID'
      - '--build-arg'
      - 'FIREBASE_MEASUREMENT_ID=$_FIREBASE_MEASUREMENT_ID'
      - '--build-arg'
      - 'API_BASE_URL=$_API_BASE_URL'

# Defaults for local `gcloud builds submit`; the trigger overrides these with your console values.
substitutions:
  _AR_HOSTNAME: us-east1-docker.pkg.dev
  _AR_PROJECT_ID: roster-riddles-457600
  _AR_REPOSITORY: cloud-run-source-deploy
  _SERVICE_NAME: roster-riddles
  _DEPLOY_REGION: us-east1
  _API_BASE_URL: ''
  _FIREBASE_API_KEY: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_PROJECT_ID: ''
  _FIREBASE_STORAGE_BUCKET: ''
  _FIREBASE_MESSAGING_SENDER_ID: ''
  _FIREBASE_APP_ID: ''
  _FIREBASE_MEASUREMENT_ID: ''

images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

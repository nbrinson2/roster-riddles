<div class="login-panel">
  <div class="login-title">
    <h1>{{ mode === 'signIn' ? 'Sign in' : 'Create account' }}</h1>
  </div>

  <div class="login-content">
    <button
      type="button"
      mat-stroked-button
      class="google-button"
      [disabled]="submitting"
      (click)="signInWithGoogle()"
    >
      <span class="google-button-label">Continue with Google</span>
    </button>

    <div class="divider"><span>or</span></div>

    <form [formGroup]="form" (ngSubmit)="submitEmailPassword()" class="email-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-error *ngIf="form.controls.email.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="form.controls.email.hasError('email')">Enter a valid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input
          matInput
          type="password"
          formControlName="password"
          [attr.autocomplete]="mode === 'signUp' ? 'new-password' : 'current-password'"
        />
        <mat-error *ngIf="form.controls.password.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="form.controls.password.hasError('minlength')">At least 6 characters</mat-error>
      </mat-form-field>

      <p *ngIf="errorMessage" class="message error" role="alert">{{ errorMessage }}</p>
      <p *ngIf="resetMessage" class="message success" role="status">{{ resetMessage }}</p>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        class="submit-button"
        [disabled]="submitting"
      >
        {{ submitting ? 'Please wait…' : mode === 'signIn' ? 'Sign in' : 'Sign up' }}
      </button>
    </form>

    <div class="links">
      <button type="button" class="link" (click)="setMode(mode === 'signIn' ? 'signUp' : 'signIn')">
        {{ mode === 'signIn' ? 'Need an account? Sign up' : 'Have an account? Sign in' }}
      </button>
      <button
        *ngIf="mode === 'signIn'"
        type="button"
        class="link"
        (click)="sendReset()"
        [disabled]="submitting"
      >
        Forgot password?
      </button>
    </div>
  </div>
</div>

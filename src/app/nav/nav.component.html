<div class="home-container">
  <mat-sidenav-container>
    <mat-sidenav #drawer mode="over" [position]="matDrawerPosition">
      <ng-container *ngIf="selectedRoster && viewRoster">
        <active-roster-table
          [roster]="selectedRoster"
          (playerSelected)="handlePlayerSelection()"
        ></active-roster-table>
      </ng-container>
      <ng-container
        *ngIf="
          selectedRosterByYears &&
          viewRoster &&
          selectedRosterYears &&
          selectedRosterTeamName
        "
      >
        <roster-by-years-table
          [years]="selectedRosterYears"
          [teamName]="selectedRosterTeamName"
          [roster]="selectedRosterByYears"
          (playerSelected)="handlePlayerSelection()"
        ></roster-by-years-table>
      </ng-container>
      <ng-container *ngIf="leaderboardsUiEnabled && viewLeaderboard">
        <leaderboard-panel></leaderboard-panel>
      </ng-container>
      <ng-container
        *ngIf="
          weeklyContestsUiEnabled &&
          viewContests &&
          currentGameName === GameType.BIO_BALL
        "
      >
        <contests-panel
          (requestSignIn)="openLoginMenu()"
        ></contests-panel>
      </ng-container>
      <ng-container *ngIf="viewMenu">
        <how-to-play
          [gameType]="currentGameName"
          [currentGameMode]="currentGameMode()"
        ></how-to-play>
      </ng-container>
      <ng-container *ngIf="loggedIn && viewProfile && user">
        <profile [user]="user"></profile>
      </ng-container>
      <ng-container
        *ngIf="loggedIn && viewAdmin && adminDashboardUiEnabled && user"
      >
        <div
          class="admin-dashboard-shell"
          role="region"
          aria-labelledby="admin-dashboard-heading"
        >
          <h2 id="admin-dashboard-heading" class="admin-dashboard-shell-title">
            Admin
          </h2>
        </div>
      </ng-container>
      <div
        *ngIf="
          !loggedIn &&
            !viewProfile &&
            !viewAdmin &&
            !viewMenu &&
            !viewRoster &&
            !viewLeaderboard &&
            !viewContests
        "
        class="login-menu"
      >
        <login-panel (authSuccess)="onLoginSuccess()"></login-panel>
      </div>
    </mat-sidenav>
    <mat-sidenav-content>
      <div class="nav-container">
        <div class="nav-left-icons">
          <div class="menu-icon-container" (click)="openMenu()">
            <span class="material-symbols-outlined menu-icon">info</span>
          </div>
          <div
            *ngIf="leaderboardsUiEnabled"
            class="menu-icon-container"
            role="button"
            tabindex="0"
            aria-label="Open leaderboard"
            (click)="openLeaderboard()"
            (keydown.enter)="openLeaderboard()"
            (keydown.space)="$event.preventDefault(); openLeaderboard()"
          >
            <span class="material-symbols-outlined menu-icon">leaderboard</span>
          </div>
          <div
            *ngIf="
              weeklyContestsUiEnabled &&
              currentGameName === GameType.BIO_BALL
            "
            class="menu-icon-container"
            role="button"
            tabindex="0"
            aria-label="Open weekly contests"
            (click)="openContests()"
            (keydown.enter)="openContests()"
            (keydown.space)="$event.preventDefault(); openContests()"
          >
            <span class="material-symbols-outlined menu-icon">event</span>
          </div>
        </div>
        <div class="icons-right-container">
          <ng-container *ngIf="currentGameMode() !== 'n/a'">
            <difficulty-toggle
              [value]="currentGameMode()"
              (valueChange)="handleDifficultyChange($event)"
            ></difficulty-toggle>
          </ng-container>
          <div *ngIf="!loggedIn" class="login-button" (click)="openLoginMenu()">
            <span class="material-symbols-outlined login-icon"> login </span>
          </div>
          <div *ngIf="loggedIn" class="profile-logout-container">
            <span
              class="material-symbols-outlined logout-icon"
              (click)="logout()"
            >
              logout
            </span>
            <div
              *ngIf="
                adminDashboardUiEnabled &&
                  (userMeCapabilities.isAdmin$ | async)
              "
              class="admin-dashboard-icon-wrap"
              role="button"
              tabindex="0"
              aria-label="Open admin dashboard"
              (click)="openAdminDashboard()"
              (keydown.enter)="openAdminDashboard()"
              (keydown.space)="
                $event.preventDefault(); openAdminDashboard()
              "
            >
              <span class="material-symbols-outlined admin-dashboard-icon"
                >admin_panel_settings</span
              >
            </div>
            <span
              class="material-symbols-outlined profile-icon"
              (click)="openProfileMenu()"
              (keydown.enter)="openProfileMenu()"
              (keydown.space)="$event.preventDefault(); openProfileMenu()"
              role="button"
              tabindex="0"
              aria-label="Account"
            >
              person
            </span>
          </div>
        </div>
      </div>
      <div class="game-container">
        <router-outlet></router-outlet>
      </div>
      <slide-up>
        <div slide-up-heading>
          <h2 class="slide-up-heading-text">Correct Answer</h2>
        </div>
        <ng-container *ngIf="bioBallPlayerToGuess() as player">
          <bio-ball-player [player]="player"></bio-ball-player>
        </ng-container>
        <ng-container *ngIf="careerPathPlayerToGuess() as player">
          <player-timeline
            [playerName]="player.name"
            [groups]="player.groups"
          ></player-timeline>
        </ng-container>
        <ng-container *ngIf="nicknameStreakPlayerToGuess() as player">
          <guess-result
            [fullName]="player.name"
            [nickname]="nicknameStreakNicknameToGuess"
            [isCorrect]="true"
          ></guess-result>
        </ng-container>
      </slide-up>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>

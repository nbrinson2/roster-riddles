# Deploy Python Cloud Function (Gen2) from daily-job/ — use a dedicated Cloud Build trigger.
# Cloud Functions are managed by the Functions API; Cloud Run's "Connect to repo" is disabled for them.
#
# Trigger: push to main, optional path filter: daily-job/**
#
# IAM: Cloud Build service account needs Cloud Functions Developer, Cloud Run Admin,
#      and Service Account User on the runtime service account. See README.
#
# Step 1 removes an existing function with the same name so deploy does not hit 409 when
# Cloud Run / Functions state is out of sync. Brief downtime during that window.

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - 'gcloud functions delete $_FUNCTION_NAME --region=$_FUNCTION_REGION --quiet || true'

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - $_FUNCTION_NAME
      - --gen2
      - --region=$_FUNCTION_REGION
      - --runtime=python311
      - --source=daily-job
      - --entry-point=update_mlb_players_snapshot
      - --trigger-http
      - --allow-unauthenticated

substitutions:
  _FUNCTION_NAME: update-mlb-players-snapshot
  _FUNCTION_REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
